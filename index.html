<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { color: #888; margin-top: 8px; font-size: 1.1rem; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
        }

        .controls button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        #organizeBtn {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
        }

        #restoreBtn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
        }

        #resetBtn {
            background: #1e1e2e;
            color: #aaa;
            border: 1px solid #333 !important;
        }

        .controls button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .controls button:active { transform: scale(0.96); }

        .stage {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .panel {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a40;
            flex: 1;
            min-width: 300px;
            max-width: 480px;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a40;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 80px;
        }

        .file {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 1;
            transform: scale(1);
            white-space: nowrap;
        }

        .file.moving {
            position: fixed;
            z-index: 1000;
            opacity: 0.9;
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .file.arrived {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cat-images { background: #1e3a2f; color: #6ee7b7; }
        .cat-pdf { background: #3a1e1e; color: #fca5a5; }
        .cat-docs { background: #1e2a3a; color: #93c5fd; }
        .cat-spreadsheets { background: #2a3a1e; color: #bef264; }
        .cat-code { background: #2a1e3a; color: #c4b5fd; }
        .cat-audio { background: #3a2a1e; color: #fdba74; }
        .cat-video { background: #1e3a3a; color: #67e8f9; }
        .cat-archives { background: #3a3a1e; color: #fde68a; }
        .cat-slides { background: #2a1e2a; color: #f0abfc; }
        .cat-misc { background: #2a2a2a; color: #aaa; }

        .icon { font-size: 1rem; }

        .dest-panel {
            max-width: 100%;
            min-width: 0;
            width: 100%;
        }

        .category-folders {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .category-folder {
            background: #12121e;
            border: 1px solid #2a2a40;
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 130px;
            flex: 1;
            transition: all 0.4s;
        }

        .category-folder.active {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .category-folder h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-folder .files-in-folder {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 30px;
        }

        .category-folder .files-in-folder .file {
            padding: 5px 10px;
            font-size: 0.78rem;
            transform-origin: left center;
        }

        .log-bar {
            max-width: 1100px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        #log {
            background: #111122;
            border: 1px solid #2a2a40;
            border-radius: 10px;
            padding: 14px 18px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #6ee7b7;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.7;
        }

        #log .arrow { color: #3b82f6; }

        .status {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #888;
            min-height: 24px;
        }

        .status span {
            display: inline-block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding: 16px;
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a40;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat .label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <h1>Folder Manager</h1>
    <p>Organize &amp; Restore files by category</p>
</header>

<div class="controls">
    <button id="organizeBtn" onclick="startOrganize()">▶ Organize</button>
    <button id="restoreBtn" onclick="startRestore()" disabled>↩ Restore</button>
    <button id="resetBtn" onclick="resetAll()">↻ Reset</button>
</div>

<div class="status" id="status"></div>

<div class="stage">
    <div class="panel" id="sourcePanel">
        <h2>📂 Source Folder</h2>
        <div class="file-grid" id="sourceFiles"></div>
    </div>

    <div class="panel dest-panel" id="destPanel">
        <h2>📁 Organized</h2>
        <div class="category-folders" id="categoryFolders"></div>
    </div>
</div>

<div class="stats">
    <div class="stat"><div class="num" id="statMoved">0</div><div class="label">Moved</div></div>
    <div class="stat"><div class="num" id="statCategories">0</div><div class="label">Categories</div></div>
    <div class="stat"><div class="num" id="statPending">0</div><div class="label">Pending</div></div>
</div>

<div class="log-bar">
    <div id="log"></div>
</div>

<script>
const FILES = [
    { name: "photo.jpg",    cat: "images",      icon: "🖼️" },
    { name: "screenshot.png", cat: "images",    icon: "🖼️" },
    { name: "report.pdf",   cat: "pdf",         icon: "📄" },
    { name: "resume.docx",  cat: "docs",        icon: "📝" },
    { name: "notes.md",     cat: "docs",        icon: "📝" },
    { name: "budget.csv",   cat: "spreadsheets", icon: "📊" },
    { name: "app.js",       cat: "code",        icon: "💻" },
    { name: "style.css",    cat: "code",        icon: "💻" },
    { name: "index.html",   cat: "code",        icon: "💻" },
    { name: "song.mp3",     cat: "audio",       icon: "🎵" },
    { name: "clip.mp4",     cat: "video",       icon: "🎬" },
    { name: "backup.zip",   cat: "archives",    icon: "📦" },
    { name: "slides.pptx",  cat: "slides",      icon: "📊" },
    { name: "logo.svg",     cat: "images",      icon: "🖼️" },
    { name: "data.json",    cat: "code",        icon: "💻" },
];

const CATEGORIES = {
    images:      { label: "Images",      icon: "🖼️" },
    pdf:         { label: "PDF",         icon: "📄" },
    docs:        { label: "Docs",        icon: "📝" },
    spreadsheets:{ label: "Spreadsheets", icon: "📊" },
    code:        { label: "Code",        icon: "💻" },
    audio:       { label: "Audio",       icon: "🎵" },
    video:       { label: "Video",       icon: "🎬" },
    archives:    { label: "Archives",    icon: "📦" },
    slides:      { label: "Slides",      icon: "📊" },
};

let isAnimating = false;

function init() {
    const source = document.getElementById("sourceFiles");
    source.innerHTML = "";
    FILES.forEach(f => {
        const el = document.createElement("div");
        el.className = `file cat-${f.cat}`;
        el.id = `file-${f.name}`;
        el.innerHTML = `<span class="icon">${f.icon}</span> ${f.name}`;
        source.appendChild(el);
    });

    const folders = document.getElementById("categoryFolders");
    folders.innerHTML = "";
    for (const [key, val] of Object.entries(CATEGORIES)) {
        const div = document.createElement("div");
        div.className = "category-folder";
        div.id = `folder-${key}`;
        div.innerHTML = `<h3>${val.icon} ${val.label}</h3><div class="files-in-folder"></div>`;
        folders.appendChild(div);
    }
    updateStats(0, 0, FILES.length);
}

function setStatus(msg) {
    document.getElementById("status").innerHTML = msg ? `<span>${msg}</span>` : "";
}

function addLog(msg) {
    const log = document.getElementById("log");
    log.innerHTML += msg + "<br>";
    log.scrollTop = log.scrollHeight;
}

function updateStats(moved, categories, pending) {
    document.getElementById("statMoved").textContent = moved;
    document.getElementById("statCategories").textContent = categories;
    document.getElementById("statPending").textContent = pending;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function moveFile(fileData, fromEl, toContainer) {
    const fromRect = fromEl.getBoundingClientRect();
    const toRect = toContainer.getBoundingClientRect();

    const clone = fromEl.cloneNode(true);
    clone.style.position = "fixed";
    clone.style.left = fromRect.left + "px";
    clone.style.top = fromRect.top + "px";
    clone.style.width = fromRect.width + "px";
    clone.style.zIndex = 1000;
    clone.style.transition = "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
    clone.style.boxShadow = "0 8px 30px rgba(0,0,0,0.6)";
    clone.style.pointerEvents = "none";
    document.body.appendChild(clone);

    fromEl.style.opacity = "0.2";

    await sleep(30);

    const targetX = toRect.left + 10;
    const targetY = toRect.top + toContainer.offsetHeight + 4;
    clone.style.left = targetX + "px";
    clone.style.top = targetY + "px";
    clone.style.transform = "scale(0.5)";

    await sleep(550);

    clone.remove();
    fromEl.style.display = "none";

    const mini = document.createElement("div");
    mini.className = `file cat-${fileData.cat} arrived`;
    mini.innerHTML = `<span class="icon">${fileData.icon}</span> ${fileData.name}`;
    toContainer.appendChild(mini);
}

async function startOrganize() {
    if (isAnimating) return;
    isAnimating = true;
    document.getElementById("organizeBtn").disabled = true;

    setStatus("⏳ Organizing files...");
    document.getElementById("log").innerHTML = "";

    const sourceEl = document.getElementById("sourceFiles");
    const moved = new Set();
    const catsUsed = new Set();

    for (let i = 0; i < FILES.length; i++) {
        const f = FILES[i];
        const fileEl = document.getElementById(`file-${f.name}`);
        const folderEl = document.querySelector(`#folder-${f.cat} .files-in-folder`);
        const folderBox = document.getElementById(`folder-${f.cat}`);

        if (!fileEl || !folderEl) continue;

        folderBox.classList.add("active");
        setStatus(`Moving ${f.name} → ${CATEGORIES[f.cat].label}`);

        await moveFile(f, fileEl, folderEl);
        await sleep(150);

        moved.add(f.name);
        catsUsed.add(f.cat);
        addLog(`${f.name}  <span class="arrow">→</span>  Organized/${CATEGORIES[f.cat].label}/${f.name}`);
        updateStats(moved.size, catsUsed.size, FILES.length - moved.size);

        folderBox.classList.remove("active");
    }

    setStatus("✅ All files organized!");
    document.getElementById("restoreBtn").disabled = false;
    isAnimating = false;
}

async function startRestore() {
    if (isAnimating) return;
    isAnimating = true;
    document.getElementById("restoreBtn").disabled = true;

    setStatus("⏳ Restoring files...");

    const sourceEl = document.getElementById("sourceFiles");
    const filesToRestore = [];

    for (const f of FILES) {
        const folderContainer = document.querySelector(`#folder-${f.cat} .files-in-folder`);
        const miniFile = folderContainer ? folderContainer.querySelector(`.file`) : null;
        if (miniFile) {
            filesToRestore.push({ fileData: f, miniEl: miniFile });
        }
    }

    for (let i = 0; i < filesToRestore.length; i++) {
        const { fileData, miniEl } = filesToRestore[i];
        const fromRect = miniEl.getBoundingClientRect();
        const toRect = sourceEl.getBoundingClientRect();

        const clone = miniEl.cloneNode(true);
        clone.style.position = "fixed";
        clone.style.left = fromRect.left + "px";
        clone.style.top = fromRect.top + "px";
        clone.style.width = fromRect.width + "px";
        clone.style.zIndex = 1000;
        clone.style.transition = "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
        clone.style.boxShadow = "0 8px 30px rgba(0,0,0,0.6)";
        clone.style.pointerEvents = "none";
        document.body.appendChild(clone);

        miniEl.style.opacity = "0.2";
        setStatus(`Restoring ${fileData.name}`);

        await sleep(30);

        clone.style.left = (toRect.left + 10) + "px";
        clone.style.top = (toRect.top + sourceEl.offsetHeight + 4) + "px";
        clone.style.transform = "scale(0.5)";

        await sleep(550);
        clone.remove();
        miniEl.remove();

        const origFile = document.getElementById(`file-${fileData.name}`);
        if (origFile) {
            origFile.style.display = "flex";
            origFile.style.opacity = "0";
            origFile.classList.add("arrived");
            requestAnimationFrame(() => { origFile.style.opacity = "1"; });
        }

        addLog(`${fileData.name}  <span class="arrow">←</span>  Restored to source`);
        await sleep(150);
    }

    updateStats(0, 0, FILES.length);
    setStatus("✅ All files restored!");
    isAnimating = false;
}

function resetAll() {
    if (isAnimating) return;
    document.getElementById("log").innerHTML = "";
    document.getElementById("restoreBtn").disabled = true;
    document.getElementById("organizeBtn").disabled = false;
    setStatus("");
    init();
}

init();
</script>
</body>
</html>
